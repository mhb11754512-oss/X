plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.projectx.phoneapk'
    compileSdk 34

    defaultConfig {
        applicationId 'com.projectx.phoneapk'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '1.0'

        // Change this to your server phone page URL if needed.
        buildConfigField 'String', 'PHONE_PAGE_URL', '"https://your-domain.example/phone"'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
